<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Tienda EcoSport — indumentaria, equipo y accesorios de montaña fabricados con materiales reciclados.">
<title>Tienda — EcoSport</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body data-page="tienda">

<div id="nav-root"></div>

<main>

  <section class="page-head">
    <div class="wrap">
      <p class="eyebrow">Tienda</p>
      <h1 class="page-head__title">Material técnico,<br>sin concesiones.</h1>
      <p class="page-head__text">Una selección reducida y deliberada, fabricada con materiales reciclados. Solo el equipo que llevaríamos a la montaña nosotros mismos.</p>
    </div>
  </section>

  <section class="shop section">
    <div class="wrap">
      <div class="shop__filters" id="shop-filters">
        <button class="filter is-active" data-filter="todo">Todo</button>
        <button class="filter" data-filter="indumentaria">Indumentaria</button>
        <button class="filter" data-filter="equipo">Equipo</button>
        <button class="filter" data-filter="accesorios">Accesorios</button>
      </div>
      <div class="products products--shop" id="shop-grid"></div>
    </div>
  </section>

</main>

<div id="footer-root"></div>
<script src="app.js" defer></script>
</body>
</html>
